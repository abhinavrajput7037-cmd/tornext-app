<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>No Connection</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Nunito:wght@600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#0a0a0f;font-family:'Nunito',sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg{position:fixed;inset:0;background-image:linear-gradient(rgba(233,30,140,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(233,30,140,.04) 1px,transparent 1px);background-size:40px 40px;animation:grid 20s linear infinite}
@keyframes grid{to{background-position:40px 40px}}
.o1,.o2{position:fixed;border-radius:50%;filter:blur(80px);opacity:.15;animation:orb 6s ease-in-out infinite alternate}
.o1{width:280px;height:280px;background:#e91e8c;top:-80px;left:-80px}
.o2{width:220px;height:220px;background:#9b27e6;bottom:-60px;right:-60px;animation-delay:-3s}
@keyframes orb{to{transform:scale(1.3);opacity:.25}}
.box{position:relative;z-index:1;text-align:center;padding:32px 24px;display:flex;flex-direction:column;align-items:center;gap:24px}
.logo{display:flex;align-items:center;gap:10px}
.logo-ic{width:36px;height:36px;background:linear-gradient(135deg,#e91e8c,#9b27e6);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(233,30,140,.5)}
.logo-ic svg{width:20px;height:20px}
.logo-tx{font-family:'Rajdhani',sans-serif;font-size:1.4rem;letter-spacing:2px;background:linear-gradient(135deg,#fff,#e91e8c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sig{position:relative;width:110px;height:110px}
.ring1,.ring2{position:absolute;border-radius:50%;border:1px solid rgba(255,71,87,.2);animation:rng 2.5s ease-in-out infinite}
.ring1{inset:0}
.ring2{inset:-14px;animation-delay:.5s}
@keyframes rng{50%{transform:scale(1.1);opacity:.4}}
.inner{position:absolute;inset:10px;border-radius:50%;background:#1a0810;display:flex;align-items:center;justify-content:center}
.wifi{display:flex;flex-direction:column;align-items:center;gap:3px}
.arc{border:3px solid #ff4757;border-bottom:none;border-radius:50% 50% 0 0/100% 100% 0 0;animation:blink 1.8s infinite}
.arc:nth-child(1){width:34px;height:17px}
.arc:nth-child(2){width:20px;height:10px;animation-delay:.2s}
.arc:nth-child(3){width:8px;height:4px;animation-delay:.4s}
.wdot{width:6px;height:6px;background:#ff4757;border-radius:50%;margin-top:2px;animation:blink 1.8s .6s infinite}
@keyframes blink{50%{opacity:.2}}
.cross{position:absolute;width:54px;height:3px;background:#ff4757;border-radius:2px;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-45deg);box-shadow:0 0 10px rgba(255,71,87,.7)}
.title{font-family:'Rajdhani',sans-serif;font-size:1.75rem;font-weight:700;letter-spacing:1px}
.title span{background:linear-gradient(135deg,#ff4757,#ff8a00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:.88rem;color:#a0a0c0;line-height:1.6;max-width:270px}
.pills{display:flex;gap:10px}
.pill{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:.74rem;font-weight:700;background:#16161f;border:1px solid #2a2a3a;color:#a0a0c0}
.d{width:7px;height:7px;border-radius:50%}
.dr{background:#ff4757;box-shadow:0 0 6px #ff4757;animation:blink 1.2s infinite}
.dy{background:#ffa500;box-shadow:0 0 6px #ffa500;animation:blink 1.2s .4s infinite}
.btn{display:flex;align-items:center;gap:10px;padding:14px 36px;border-radius:14px;border:none;background:linear-gradient(135deg,#e91e8c,#9b27e6);color:#fff;font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:1px;cursor:pointer;box-shadow:0 0 25px rgba(233,30,140,.4)}
.btn svg{width:18px;height:18px}
.tip{font-size:.75rem;color:#55556a}
</style>
</head>
<body>
<div class="bg"></div>
<div class="o1"></div>
<div class="o2"></div>
<div class="box">
  <div class="logo">
    <div class="logo-ic"><svg viewBox="0 0 24 24" fill="white"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
    <div class="logo-tx">RSY BATTLE</div>
  </div>
  <div class="sig">
    <div class="ring2"></div>
    <div class="ring1"></div>
    <div class="inner">
      <div class="wifi">
        <div class="arc"></div>
        <div class="arc"></div>
        <div class="arc"></div>
        <div class="wdot"></div>
      </div>
    </div>
    <div class="cross"></div>
  </div>
  <div class="title">Connection <span>Lost!</span></div>
  <p class="sub">Internet nahi mila. WiFi ya Mobile Data check karo aur dobara try karo.</p>
  <div class="pills">
    <div class="pill"><div class="d dr"></div>No Internet</div>
    <div class="pill"><div class="d dy"></div>Reconnecting</div>
  </div>
  <button class="btn" onclick="gonative.webview.reload()">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
    RETRY
  </button>
  <p class="tip">🎮 Tournaments wait kar rahe hain...</p>
</div>
</body>
</html>
